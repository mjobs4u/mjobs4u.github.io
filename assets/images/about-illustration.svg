<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" role="img" aria-label="Team at work">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef4ee"/>
      <stop offset="1" stop-color="#dfeadf"/>
    </linearGradient>
  </defs>
  <rect width="600" height="420" rx="24" fill="url(#abg)"/>
  <!-- window -->
  <rect x="60" y="50" width="220" height="160" rx="8" fill="#cfe2c8" stroke="#5a8b58" stroke-width="2"/>
  <line x1="170" y1="50" x2="170" y2="210" stroke="#5a8b58" stroke-width="2"/>
  <line x1="60" y1="130" x2="280" y2="130" stroke="#5a8b58" stroke-width="2"/>
  <!-- plant -->
  <rect x="320" y="170" width="40" height="40" fill="#a87a4a"/>
  <path d="M340 170 q-30 -40 -10 -80 q20 30 10 80 z M340 170 q30 -40 10 -80 q-20 30 -10 80 z" fill="#2f7d5b"/>

  <!-- desk -->
  <rect x="40" y="260" width="520" height="14" rx="4" fill="#c89a6a"/>

  <!-- three people sitting -->
  <g transform="translate(90,220)">
    <circle cx="20" cy="20" r="20" fill="#f3c8a3"/>
    <path d="M-4 40 q24 -10 48 0 l4 40 l-56 0 z" fill="#1f3046"/>
    <path d="M2 12 q8 -20 24 -16 q16 4 18 18 q-10 -2 -22 0 q-12 2 -20 -2 z" fill="#2c1e14"/>
  </g>
  <g transform="translate(270,210)">
    <circle cx="20" cy="20" r="20" fill="#e0a880"/>
    <path d="M-4 40 q24 -10 48 0 l4 50 l-56 0 z" fill="#2f7d5b"/>
    <path d="M2 14 q4 -18 22 -16 q18 2 22 18 q-12 -2 -22 0 q-14 2 -22 -2 z" fill="#1a0f08"/>
  </g>
  <g transform="translate(440,225)">
    <circle cx="20" cy="20" r="20" fill="#f1b58a"/>
    <path d="M-4 40 q24 -10 48 0 l4 40 l-56 0 z" fill="#7a3d2f"/>
    <path d="M0 14 q6 -16 22 -14 q18 2 22 18 q-10 -2 -22 0 q-14 2 -22 -4 z" fill="#241008"/>
  </g>

  <!-- speech bubbles -->
  <g font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#1f3046">
    <rect x="320" y="100" width="200" height="60" rx="14" fill="#fff" stroke="#cfd9cf"/>
    <text x="340" y="128">"Found our SAP lead in</text>
    <text x="340" y="148">11 days. Right fit too."</text>
    <path d="M340 160 l-10 18 l30 -8 z" fill="#fff" stroke="#cfd9cf"/>
  </g>
</svg>
